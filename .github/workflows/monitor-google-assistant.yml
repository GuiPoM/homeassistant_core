name: Monitor Google Assistant Component Changes

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-upstream-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: integration/google-assistant-unleashed

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/home-assistant/core.git || true
          git fetch upstream dev

      - name: Check for changes in google_assistant component
        id: check_changes
        run: |
          # Get the latest commit on our integration branch
          OUR_COMMIT=$(git rev-parse HEAD)
          echo "Our commit: $OUR_COMMIT"

          # Get the base commit from upstream that we branched from
          # Look for the most recent common ancestor
          BASE_COMMIT=$(git merge-base HEAD upstream/dev)
          echo "Base commit: $BASE_COMMIT"

          # Check if there are new commits on upstream/dev that touch google_assistant
          UPSTREAM_CHANGES=$(git log --oneline $BASE_COMMIT..upstream/dev -- homeassistant/components/google_assistant/ | head -20)

          if [ -n "$UPSTREAM_CHANGES" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "## Changes Detected in upstream google_assistant component" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The following commits have been made to the google_assistant component upstream:" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$UPSTREAM_CHANGES" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required:** Review these changes and update the custom component if needed." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Files Changed:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            git diff --name-only $BASE_COMMIT..upstream/dev -- homeassistant/components/google_assistant/ >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            # Save details for issue creation
            echo "$UPSTREAM_CHANGES" > /tmp/changes.txt
            git diff --stat $BASE_COMMIT..upstream/dev -- homeassistant/components/google_assistant/ > /tmp/diffstat.txt
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "✅ No changes detected in upstream google_assistant component" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Get detailed diff
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: |
          BASE_COMMIT=$(git merge-base HEAD upstream/dev)
          git diff $BASE_COMMIT..upstream/dev -- homeassistant/components/google_assistant/ > /tmp/full_diff.txt

          # Also check for changes in related test files
          git log --oneline $BASE_COMMIT..upstream/dev -- tests/components/google_assistant/ > /tmp/test_changes.txt || echo "No test changes" > /tmp/test_changes.txt

      - name: Create issue if changes detected
        if: steps.check_changes.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changes = fs.readFileSync('/tmp/changes.txt', 'utf8');
            const diffstat = fs.readFileSync('/tmp/diffstat.txt', 'utf8');
            const testChanges = fs.readFileSync('/tmp/test_changes.txt', 'utf8');

            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-changes,google-assistant'
            });

            if (issues.data.length > 0) {
              console.log('Issue already exists, skipping creation');
              return;
            }

            // Create new issue with properly formatted body
            const issueBody = [
              '## 🔔 Upstream Changes Detected in google_assistant Component',
              '',
              '### Summary',
              'The official Home Assistant `google_assistant` component has been updated. Review these changes to determine if the custom component needs updates.',
              '',
              '### Commits in Upstream',
              '```',
              changes.trim(),
              '```',
              '',
              '### Files Changed (Stats)',
              '```',
              diffstat.trim(),
              '```',
              '',
              '### Test Changes',
              '```',
              testChanges.trim(),
              '```',
              '',
              '### Action Items',
              '- [ ] Review the upstream changes',
              '- [ ] Determine impact on custom component features (`require_acknowledgment`, `require_presence`)',
              '- [ ] Update custom component if necessary',
              '- [ ] Run tests to verify compatibility',
              '- [ ] Sync changes to google-assistant-unleashed repository',
              '',
              '### Links',
              '- [Upstream Repository](https://github.com/home-assistant/core)',
              '- [Component Path](https://github.com/home-assistant/core/tree/dev/homeassistant/components/google_assistant)',
              '- [Custom Component Repository](https://github.com/GuiPoM/google-assistant-unleashed)',
              '',
              '### How to Review',
              '```bash',
              'cd /c/SAPDevelop/git/perso/homeassistant_core',
              'git fetch upstream dev',
              'BASE_COMMIT=$(git merge-base HEAD upstream/dev)',
              'git diff $BASE_COMMIT..upstream/dev -- homeassistant/components/google_assistant/',
              '```',
              '',
              '---',
              '*This issue was automatically created by the upstream monitoring workflow.*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔔 Upstream changes detected in google_assistant component',
              body: issueBody,
              labels: ['upstream-changes', 'google-assistant', 'needs-review']
            });

            console.log('Issue created successfully');

      - name: Post workflow summary
        if: always()
        run: |
          if [ "${{ steps.check_changes.outputs.changes_detected }}" == "true" ]; then
            echo "⚠️ Changes detected - Issue created for review"
          else
            echo "✅ No changes - Custom component is up to date"
          fi
